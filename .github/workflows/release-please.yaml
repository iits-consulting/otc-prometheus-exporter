name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release-please:
    runs-on: ubuntu-24.04
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      prs: ${{ steps.release.outputs.prs }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  helm-docs:
    runs-on: ubuntu-24.04
    needs: release-please
    if: needs.release-please.outputs.prs != '[]' && needs.release-please.outputs.prs != ''
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ fromJson(needs.release-please.outputs.prs)[0].headBranchName }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run helm-docs
        run: make helm-docs
        env:
          HELM_DOCS_IMAGE: jnorwood/helm-docs:v1.14.2
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet charts/otc-prometheus-exporter/README.md || (
            git add charts/otc-prometheus-exporter/README.md &&
            git commit -m "chore: update helm-docs" &&
            git push
          )

  release:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    uses: ./.github/workflows/release.yaml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    permissions:
      contents: write
      packages: write

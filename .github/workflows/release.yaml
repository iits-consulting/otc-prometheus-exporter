name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  guard:
    name: Verify Chart Versions
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches Chart.yaml version and appVersion
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CHART_VERSION=$(grep '^version:' charts/otc-prometheus-exporter/Chart.yaml | awk '{print $2}')
          APP_VERSION=$(grep '^appVersion:' charts/otc-prometheus-exporter/Chart.yaml | awk '{print $2}')

          echo "Tag version:   $TAG_VERSION"
          echo "Chart version: $CHART_VERSION"
          echo "App version:   $APP_VERSION"

          if [ "$CHART_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Chart version ($CHART_VERSION) must match tag ($TAG_VERSION)."
            echo "Merge a release-please PR before pushing this tag."
            exit 1
          fi

          if [ "$APP_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: App version ($APP_VERSION) must match tag ($TAG_VERSION)."
            echo "Merge a release-please PR before pushing this tag."
            exit 1
          fi

  # --- Quality gates (re-run on every release; do not rely on PR CI alone) ---

  quality-gates:
    needs: guard
    uses: ./.github/workflows/quality-gates.yaml

  # --- Release: Docker + goreleaser + Helm chart ---

  docker:
    name: Build and Push Docker Image
    needs: quality-gates
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          push: true
          build-args: VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ env.VERSION }}

  goreleaser:
    name: Release Binaries
    needs: quality-gates
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm-release:
    name: Publish Helm Chart
    needs: [docker, goreleaser]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - uses: helm/chart-releaser-action@v1
        with:
          charts_dir: charts
          skip_existing: true
          mark_as_latest: false
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Quality Gates

on:
  workflow_call:

permissions:
  contents: read

jobs:
  fmt-check:
    name: Go Fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: |
          [ -z "$(gofmt -l .)" ] || (echo "Code is not formatted. Run 'go fmt ./...' and commit the result." && gofmt -d . && exit 1)

  lint-go:
    name: Go Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9

  test-go:
    name: Go Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make test

  build-go:
    name: Go Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make build

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: make helm-lint

  helm-test:
    name: Helm Unit Test
    needs: helm-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - run: make helm-test
        env:
          HELM_UNITTEST_IMAGE: helmunittest/helm-unittest:3.18.6-1.0.3

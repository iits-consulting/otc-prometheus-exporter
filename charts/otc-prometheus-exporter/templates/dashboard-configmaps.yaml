{{- if .Values.dashboards.enabled }}
{{- range $namespace, $config := .Values.targets.namespaces }}
{{- $values := mustMergeOverwrite (deepCopy $.Values.targets.defaults) (default dict $config) }}
{{- if $values.enabled }}
{{- $name := $values.dashboard }}
{{- if ne (toString $name) "false" }}
{{- if or (empty $name) (eq (toString $name) "true") }}
  {{- $name = include "otc-prometheus-exporter.namespaceName" $namespace }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $.Release.Name }}-dashboard-{{ $name }}
  namespace: {{ template "otc-prometheus-exporter.namespace" $ }}
  labels:
      grafana_dashboard: "1"
data:
  {{ printf "%s.json" $name }}: |-
  {{- $.Files.Get (printf "dashboards/%s.json" $name) | nindent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- if .Values.dashboards.selfMonitoring }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboard-exporter
  namespace: {{ template "otc-prometheus-exporter.namespace" . }}
  labels:
      grafana_dashboard: "1"
data:
  exporter.json: |-
  {{- .Files.Get "dashboards/exporter.json" | nindent 4 }}
{{- end }}
{{- if .Values.dashboards.serviceHealth }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-dashboard-status
  namespace: {{ template "otc-prometheus-exporter.namespace" . }}
  labels:
      grafana_dashboard: "1"
data:
  status.json: |-
  {{- .Files.Get "dashboards/status.json" | nindent 4 }}
{{- end }}
{{- end }}

# my global config
global:
  scrape_interval: 30s
  scrape_timeout: 15s
  evaluation_interval: 30s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

rule_files:
# - "first_rules.yml"

# Each OTC namespace is scraped as a separate target via the ?namespace= query param.
# Add or remove namespaces below to match your OTC project.
#
# Required IAM permissions:
#   Simplest: "Tenant Guest" role (global + regional project scope)
#   Fine-grained: CES ReadOnlyAccess + per-service ReadOnlyAccess for services
#   that list resources (ECS, RDS, ELB, DMS, NAT, DCS, DDS, VPC, CBR, AS).
#   CES-only namespaces (WAF, BMS, OBS, EVS, SFS, EFS, DWS, CSS, GaussDB) only
#   need CES ReadOnlyAccess.

scrape_configs:
  # --- Exporter self-monitoring (go_*, process_*, otc_scrape_*) ---
  - job_name: "otc-exporter"
    metrics_path: /metrics
    static_configs:
      - targets: ["otc-prometheus-exporter:39100"]

  # --- Compute ---
  - job_name: "otc-ecs"
    metrics_path: /metrics
    params:
      namespace: ["SYS.ECS"]
    static_configs:
      - targets: ["otc-prometheus-exporter:39100"]

  - job_name: "otc-bms"
    metrics_path: /metrics
    params:
      namespace: ["SERVICE.BMS"]

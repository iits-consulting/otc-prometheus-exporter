services:

  otc-prometheus-exporter:
    build: .
    ports:
      - "39100:39100"

    environment:
      PORT: "39100"
      REGION: "$REGION"
      OS_USERNAME: "$OS_USERNAME"
      OS_PASSWORD: "$OS_PASSWORD"
      OS_ACCESS_KEY: "$OS_ACCESS_KEY"
      OS_SECRET_KEY: "$OS_SECRET_KEY"
      OS_PROJECT_ID: "$OS_PROJECT_ID"
      OS_DOMAIN_NAME: "$OS_DOMAIN_NAME"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      # OS_REGION_PROJECT_ID: ""  # For OBS; auto-discovered if not set
      # REQUEST_TIMEOUT: "10"
      # CES_BATCH_SIZE: "500"
      # CES_LOOKBACK: "10"
      # AOM_BATCH_SIZE: "20"
      # AOM_CONCURRENCY: "5"

  prometheus:
    image: "prom/prometheus:latest"
    ports:
      - "9090:9090"
    command:
       - '--config.file=/tmp/prometheus/prometheus.yaml'
    volumes:
      - "./docker.local/prometheus:/tmp/prometheus"

  grafana:
    image: "grafana/grafana:latest"
    ports:
      - "3000:3000"
    volumes:
      - "./docker.local/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources"
      - "./docker.local/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards"
      - "./charts/otc-prometheus-exporter/dashboards:/etc/grafana/dashboards"
      - "./docker.local/grafana/data:/var/lib/grafana"
